<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- SEO -->
    <title>The Sukoon Co — Luxury Customised Travel Across India</title>
    <meta
      name="description"
      content="The Sukoon Co designs fully customised private journeys across India's most extraordinary landscapes — Ladakh, Rajasthan, Kashmir, Spiti, Banaras & beyond. No fixed departures. Only yours."
    />
    
    <!-- Google Search Console Verification Placeholder -->
    <!-- Replace 'YOUR_VERIFICATION_CODE' with the code from Search Console -->
    <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" />

    <!-- Google tag (gtag.js) GA4 -->
    <script>
      let gaId = "%VITE_GA_MEASUREMENT_ID%";
      if (!gaId || gaId === "%" + "VITE_GA_MEASUREMENT_ID" + "%" || gaId.trim() === "") {
        gaId = "G-D0S9N65HQ7"; // Fallback to live GA Tracking ID
      }
      
      if (gaId && gaId !== "YOUR_GA_ID" && gaId.trim() !== "") {
        const script = document.createElement('script');
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=" + gaId;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        window.gtag = function(){window.dataLayer.push(arguments);}
        window.gtag('js', new Date());
        window.gtag('config', gaId, {
          page_path: window.location.pathname
        });
      }
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="The Sukoon Co" />
    <meta property="og:description" content="Boutique customised travel across India." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..900;1,9..40,100..900&family=Noto+Serif:ital,wght@0,400;0,700;1,300;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
